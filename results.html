<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Election Results</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 0 0 40px 0;
        }

        .header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 20px 16px;
            text-align: center;
            border-bottom: 3px solid #e94560;
        }
        h1 { font-size: 20px; color: #fff; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: #888; }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 14px 16px;
            background: #16213e;
        }
        .stats-bar .stat { text-align: center; }
        .stats-bar .stat-val { font-size: 28px; font-weight: 700; color: #e94560; }
        .stats-bar .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .update-bar {
            padding: 12px 16px;
            background: #0f3460;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .update-bar input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 13px;
            font-family: monospace;
        }
        .update-bar input:focus { outline: none; border-color: #4ecca3; }
        .update-bar button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #4ecca3;
            color: #1a1a2e;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .update-bar button:active { transform: scale(0.97); }

        .last-update {
            text-align: center;
            font-size: 12px;
            color: #666;
            padding: 6px;
        }

        .results-list { padding: 8px 12px; }

        .result-row {
            background: #16213e;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.3s;
        }
        .result-row.top-21 { border-left: 3px solid #4ecca3; }
        .result-row.not-top { opacity: 0.6; }

        .result-rank {
            font-size: 16px;
            font-weight: 800;
            min-width: 28px;
            text-align: center;
            color: #666;
        }
        .result-row.top-21 .result-rank { color: #4ecca3; }
        .rank-medal { font-size: 20px; }

        .result-info { flex: 1; min-width: 0; }
        .result-name {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-bar {
            height: 5px;
            background: #333;
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }
        .result-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .result-row.top-21 .result-bar-fill { background: #4ecca3; }
        .result-row.not-top .result-bar-fill { background: #e94560; }

        .result-votes {
            text-align: right;
            min-width: 50px;
        }
        .result-votes .count {
            font-size: 24px;
            font-weight: 700;
        }
        .result-row.top-21 .result-votes .count { color: #4ecca3; }
        .result-votes .pct {
            font-size: 11px;
            color: #888;
        }

        .cutoff-line {
            text-align: center;
            padding: 8px;
            font-size: 12px;
            color: #e94560;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; line-height: 1.6; }
        .empty-state .hint {
            margin-top: 16px;
            background: #16213e;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #888;
        }

        .flash-update {
            animation: flashIn 0.5s ease;
        }
        @keyframes flashIn {
            0% { background: #4ecca3; }
            100% { background: #16213e; }
        }

        @media (max-width: 380px) {
            .result-votes .count { font-size: 20px; }
            .result-name { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Live Election Results</h1>
    <div class="subtitle" id="headerSubtitle">Loading...</div>
</div>

<div class="stats-bar">
    <div class="stat">
        <div class="stat-val" id="statBallots">0</div>
        <div class="stat-label">Ballots</div>
    </div>
    <div class="stat">
        <div class="stat-val" id="statTotalVotes">0</div>
        <div class="stat-label">Total Votes</div>
    </div>
    <div class="stat">
        <div class="stat-val" id="statCandidates">31</div>
        <div class="stat-label">Candidates</div>
    </div>
</div>

<div class="update-bar" id="updateBar" style="display:none;">
    <input type="text" id="dataInput" placeholder="Paste tally data here...">
    <button onclick="loadData()">Update</button>
</div>
<div class="last-update" id="lastUpdate"></div>

<div id="resultsList" class="results-list"></div>

<script>
const CANDIDATES = [
    "Rahul Agarwal (Z Cleaner)",
    "Deepak Jain",
    "Akash Agarwal",
    "Kunal Jalan",
    "Saurabh Rungta",
    "Pradip Kumar Agrawal",
    "Prashant Dayama",
    "Abhinav Dokania",
    "Aman Sharma",
    "Nitin Goyal",
    "Vikash Kumar Agrawal",
    "Ayush Agarwala",
    "Deepak Gupta",
    "Manish Agarwal (Real Estate)",
    "Ankit Kumar Gupta",
    "Puneet Goel",
    "Varun Gupta",
    "Archit Bazaz",
    "Ajay Kumar Agarwal",
    "Mayur Goel",
    "Ankit Rungta",
    "Manish Dalmia",
    "Gowrav Agarwal (Utensils)",
    "Dipak Bansal",
    "Gaurav Agarwal (PVC Window)",
    "Vatan Kumar Bansal",
    "Pranjal Sarawagi",
    "Deepa Choudhary",
    "Puneet Agarwal",
    "Nipun Sundarka",
    "Vikas Patangi"
];

let currentVotes = null;
let currentBallots = 0;

// Check URL hash for data
function init() {
    const hash = window.location.hash.slice(1);
    if (hash) {
        try {
            const decoded = decodeURIComponent(hash);
            parseAndRender(decoded);
            document.getElementById('headerSubtitle').textContent = 'Live counting in progress';
            return;
        } catch(e) {}
    }
    // No data in URL — show paste box
    document.getElementById('updateBar').style.display = 'flex';
    document.getElementById('headerSubtitle').textContent = 'Paste tally data below to view results';
    document.getElementById('resultsList').innerHTML = '<div class="empty-state"><div class="icon">&#9745;</div><p>Open the link shared by the tally person to see live results.</p></div>';
}

function loadData() {
    const raw = document.getElementById('dataInput').value.trim();
    if (!raw) { alert('Please paste tally data first.'); return; }
    parseAndRender(raw);
    document.getElementById('dataInput').value = '';
}

function parseAndRender(raw) {
    try {
        const jsonMatch = raw.match(/\{[^{}]*"v"\s*:\s*\[[^\]]*\][^{}]*\}/);
        const jsonStr = jsonMatch ? jsonMatch[0] : raw;
        const data = JSON.parse(jsonStr);

        if (!data.v || !Array.isArray(data.v) || data.v.length !== CANDIDATES.length) {
            throw new Error('Invalid');
        }

        currentVotes = data.v;
        currentBallots = data.b || 0;
        renderResults();

        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('lastUpdate').textContent = 'Last updated: ' + timeStr;
    } catch(e) {
        alert('Invalid data format. Make sure you pasted the complete tally data.');
    }
}

function renderResults() {
    if (!currentVotes) return;

    const totalVotes = currentVotes.reduce((a, b) => a + b, 0);
    document.getElementById('statBallots').textContent = currentBallots;
    document.getElementById('statTotalVotes').textContent = totalVotes;

    const sorted = CANDIDATES.map((name, i) => ({ name, sno: i + 1, votes: currentVotes[i] }))
        .sort((a, b) => b.votes - a.votes || a.sno - b.sno);

    const maxVotes = sorted.length > 0 ? sorted[0].votes : 0;
    const list = document.getElementById('resultsList');

    let html = '';
    sorted.forEach((c, rank) => {
        const isTop = rank < 21;
        const pct = maxVotes > 0 ? (c.votes / maxVotes * 100) : 0;
        const votePct = totalVotes > 0 ? ((c.votes / currentBallots) * 100).toFixed(0) : '0';

        let rankDisplay = String(rank + 1);
        if (rank === 0 && c.votes > 0) rankDisplay = '<span class="rank-medal">&#129351;</span>';
        else if (rank === 1 && c.votes > 0) rankDisplay = '<span class="rank-medal">&#129352;</span>';
        else if (rank === 2 && c.votes > 0) rankDisplay = '<span class="rank-medal">&#129353;</span>';

        html += `<div class="result-row ${isTop ? 'top-21' : 'not-top'} flash-update">
            <div class="result-rank">${rankDisplay}</div>
            <div class="result-info">
                <div class="result-name">${c.sno}. ${c.name.replace(/</g, '&lt;')}</div>
                <div class="result-bar"><div class="result-bar-fill" style="width:${pct}%"></div></div>
            </div>
            <div class="result-votes">
                <div class="count">${c.votes}</div>
                <div class="pct">${votePct}% ballots</div>
            </div>
        </div>`;

        if (rank === 20) {
            html += '<div class="cutoff-line">- - - TOP 21 CUTOFF - - -</div>';
        }
    });

    list.innerHTML = html;
}

// Also allow Enter key
document.getElementById('dataInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadData();
});

init();
</script>
</body>
</html>
