<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Counter Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 16px;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 16px;
            color: #e94560;
        }
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .controls input {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 16px;
        }
        .controls input:focus { outline: none; border-color: #e94560; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.95); }
        .btn-add { background: #e94560; color: #fff; }
        .btn-reset { background: #533483; color: #fff; }
        .btn-vote {
            background: #0f3460;
            color: #fff;
            font-size: 28px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .btn-vote:hover { background: #1a4a7a; }
        .btn-minus { background: #533483; }
        .btn-minus:hover { background: #6a45a0; }
        .btn-remove {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
        }
        .btn-remove:hover { color: #e94560; }
        .summary {
            background: #16213e;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
        }
        .summary .total { font-size: 22px; font-weight: 700; color: #e94560; }
        .candidates {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .candidate {
            background: #16213e;
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .candidate-info { flex: 1; min-width: 0; }
        .candidate-name {
            font-size: 17px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .candidate-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }
        .candidate-bar-fill {
            height: 100%;
            background: #e94560;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .candidate-stats {
            text-align: right;
            min-width: 60px;
        }
        .candidate-count {
            font-size: 26px;
            font-weight: 700;
        }
        .candidate-pct {
            font-size: 12px;
            color: #888;
        }
        .vote-btns {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .empty {
            text-align: center;
            color: #666;
            padding: 40px 0;
            font-size: 16px;
        }
        @media (max-width: 400px) {
            .candidate { padding: 10px 12px; gap: 8px; }
            .candidate-count { font-size: 22px; }
            .btn-vote { width: 46px; height: 46px; font-size: 24px; }
        }
    </style>
</head>
<body>
    <h1>Vote Counter</h1>

    <div class="controls">
        <input type="text" id="nameInput" placeholder="Enter candidate name..." maxlength="50">
        <button class="btn btn-add" onclick="addCandidate()">Add</button>
        <button class="btn btn-reset" onclick="resetAll()">Reset</button>
    </div>

    <div class="summary">
        <span>Total Votes: <span class="total" id="totalVotes">0</span></span>
        <span>Candidates: <span id="totalCandidates">0</span></span>
    </div>

    <div class="candidates" id="candidateList"></div>

    <script>
        let candidates = JSON.parse(localStorage.getItem('voteCandidates') || '[]');

        function save() {
            localStorage.setItem('voteCandidates', JSON.stringify(candidates));
        }

        function addCandidate() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (!name) return;
            candidates.push({ name, votes: 0 });
            input.value = '';
            save();
            render();
        }

        document.getElementById('nameInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addCandidate();
        });

        function vote(index, delta) {
            candidates[index].votes = Math.max(0, candidates[index].votes + delta);
            save();
            render();
        }

        function removeCandidate(index) {
            if (confirm('Remove "' + candidates[index].name + '"?')) {
                candidates.splice(index, 1);
                save();
                render();
            }
        }

        function resetAll() {
            if (candidates.length === 0) return;
            if (confirm('Reset all vote counts to zero?')) {
                candidates.forEach(c => c.votes = 0);
                save();
                render();
            }
        }

        function render() {
            const list = document.getElementById('candidateList');
            const total = candidates.reduce((s, c) => s + c.votes, 0);
            document.getElementById('totalVotes').textContent = total;
            document.getElementById('totalCandidates').textContent = candidates.length;

            if (candidates.length === 0) {
                list.innerHTML = '<div class="empty">Add candidates to start counting votes</div>';
                return;
            }

            list.innerHTML = candidates.map((c, i) => {
                const pct = total > 0 ? ((c.votes / total) * 100).toFixed(1) : '0.0';
                return `
                <div class="candidate">
                    <div class="candidate-info">
                        <div class="candidate-name">${c.name.replace(/</g, '&lt;')}</div>
                        <div class="candidate-bar">
                            <div class="candidate-bar-fill" style="width: ${pct}%"></div>
                        </div>
                    </div>
                    <div class="candidate-stats">
                        <div class="candidate-count">${c.votes}</div>
                        <div class="candidate-pct">${pct}%</div>
                    </div>
                    <div class="vote-btns">
                        <button class="btn btn-vote" onclick="vote(${i}, 1)">+</button>
                        <button class="btn btn-vote btn-minus" onclick="vote(${i}, -1)">&minus;</button>
                    </div>
                    <button class="btn-remove" onclick="removeCandidate(${i})" title="Remove">&times;</button>
                </div>`;
            }).join('');
        }

        render();
    </script>
</body>
</html>
