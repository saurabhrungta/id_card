<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Election Vote Counter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        /* Sticky header */
        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #1a1a2e;
            padding: 10px 16px;
            border-bottom: 2px solid #e94560;
        }
        h1 { text-align: center; font-size: 18px; color: #e94560; margin-bottom: 8px; }

        .ballot-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .ballot-info .stat {
            background: #16213e;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
        .ballot-info .stat strong { font-size: 20px; display: block; }
        .stat-warn strong { color: #f5a623; }
        .stat-full strong { color: #e94560; }
        .stat-ok strong { color: #4ecca3; }

        .ballot-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1;
        }
        .btn:active { transform: scale(0.97); }
        .btn-submit { background: #4ecca3; color: #1a1a2e; }
        .btn-submit:disabled { background: #333; color: #666; }
        .btn-undo { background: #533483; color: #fff; }
        .btn-undo:disabled { background: #333; color: #666; }
        .btn-clear { background: #e94560; color: #fff; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            margin-top: 8px;
        }
        .tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            background: #16213e;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab.active { background: #0f3460; color: #fff; }
        .tab:first-child { border-radius: 8px 0 0 8px; }
        .tab:last-child { border-radius: 0 8px 8px 0; }

        /* Candidate grid for voting */
        .candidate-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 10px;
        }
        .cand-btn {
            background: #16213e;
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 12px 8px;
            color: #eee;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
            text-align: center;
            transition: background 0.15s, border-color 0.15s;
            position: relative;
        }
        .cand-btn .sno {
            font-size: 11px;
            color: #666;
            display: block;
            margin-bottom: 2px;
        }
        .cand-btn .cname { display: block; line-height: 1.3; }
        .cand-btn .vote-badge {
            position: absolute;
            top: 4px;
            right: 6px;
            background: #4ecca3;
            color: #1a1a2e;
            font-size: 11px;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cand-btn.selected {
            background: #0f3460;
            border-color: #4ecca3;
        }
        .cand-btn.flash {
            background: #4ecca3;
            color: #1a1a2e;
        }

        /* Results view */
        .results {
            padding: 10px;
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            font-size: 13px;
            color: #888;
            font-weight: 600;
        }
        .result-row {
            background: #16213e;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .result-rank {
            font-size: 14px;
            font-weight: 700;
            color: #888;
            min-width: 24px;
            text-align: center;
        }
        .result-row.top-21 .result-rank { color: #4ecca3; }
        .result-info { flex: 1; }
        .result-name { font-size: 15px; font-weight: 600; }
        .result-bar {
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 4px;
        }
        .result-bar-fill {
            height: 100%;
            background: #e94560;
            border-radius: 2px;
            transition: width 0.3s;
        }
        .result-row.top-21 .result-bar-fill { background: #4ecca3; }
        .result-votes {
            font-size: 22px;
            font-weight: 700;
            min-width: 40px;
            text-align: right;
        }
        .result-row.top-21 .result-votes { color: #4ecca3; }

        .total-ballots {
            text-align: center;
            padding: 10px;
            font-size: 14px;
            color: #888;
        }
        .total-ballots strong { color: #e94560; font-size: 18px; }

        /* Reset button */
        .reset-section {
            padding: 16px;
            text-align: center;
        }
        .btn-danger {
            background: #e94560;
            color: #fff;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-share {
            background: #25d366;
            color: #fff;
        }

        @media (max-width: 380px) {
            .candidate-grid { grid-template-columns: 1fr 1fr; gap: 4px; padding: 6px; }
            .cand-btn { padding: 10px 4px; font-size: 12px; }
        }
        @media (min-width: 500px) {
            .candidate-grid { grid-template-columns: 1fr 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Election Vote Counter</h1>
    <div class="ballot-info">
        <div class="stat" id="ballotStat">
            <strong id="ballotNum">1</strong>Ballot #
        </div>
        <div class="stat" id="pickStat">
            <strong id="picksUsed">0</strong>of 21 picked
        </div>
        <div class="stat">
            <strong id="totalBallots">0</strong>Ballots Done
        </div>
    </div>
    <div class="ballot-actions">
        <button class="btn btn-undo" id="undoBtn" disabled onclick="undoLast()">Undo</button>
        <button class="btn btn-submit" id="submitBtn" onclick="submitBallot()">Submit Ballot</button>
        <button class="btn btn-clear" onclick="clearBallot()">Clear</button>
    </div>
    <div class="ballot-actions">
        <button class="btn btn-share" onclick="shareWhatsApp()">Share Live Results on WhatsApp</button>
    </div>
    <div class="tabs">
        <button class="tab active" id="tabVote" onclick="showTab('vote')">Vote</button>
        <button class="tab" id="tabResults" onclick="showTab('results')">Results</button>
    </div>
</div>

<div id="voteView" class="candidate-grid"></div>

<div id="resultsView" class="results" style="display:none;">
    <div class="total-ballots">Total Ballots Counted: <strong id="resultBallotCount">0</strong></div>
    <div class="results-header"><span>Rank / Name</span><span>Votes</span></div>
    <div id="resultsList"></div>
    <div class="reset-section">
        <button class="btn-danger" onclick="resetElection()">Reset Entire Election</button>
    </div>
</div>


<script>
const CANDIDATES = [
    "Rahul Agarwal (Z Cleaner)",
    "Deepak Jain",
    "Akash Agarwal",
    "Kunal Jalan",
    "Saurabh Rungta",
    "Pradip Kumar Agrawal",
    "Prashant Dayama",
    "Abhinav Dokania",
    "Aman Sharma",
    "Nitin Goyal",
    "Vikash Kumar Agrawal",
    "Ayush Agarwala",
    "Deepak Gupta",
    "Manish Agarwal (Real Estate)",
    "Ankit Kumar Gupta",
    "Puneet Goel",
    "Varun Gupta",
    "Archit Bazaz",
    "Ajay Kumar Agarwal",
    "Mayur Goel",
    "Ankit Rungta",
    "Manish Dalmia",
    "Gowrav Agarwal (Utensils)",
    "Dipak Bansal",
    "Gaurav Agarwal (PVC Window)",
    "Vatan Kumar Bansal",
    "Pranjal Sarawagi",
    "Deepa Choudhary",
    "Puneet Agarwal",
    "Nipun Sundarka",
    "Vikas Patangi"
];

const MAX_PICKS = 21;

// State
let votes = JSON.parse(localStorage.getItem('electionVotes') || 'null') || CANDIDATES.map(() => 0);
let ballotCount = parseInt(localStorage.getItem('electionBallotCount') || '0');
let currentPicks = []; // indices picked in current ballot
let undoStack = [];

function save() {
    localStorage.setItem('electionVotes', JSON.stringify(votes));
    localStorage.setItem('electionBallotCount', String(ballotCount));
}

// --- Vote Tab ---
function renderVoteGrid() {
    const grid = document.getElementById('voteView');
    grid.innerHTML = CANDIDATES.map((name, i) => {
        const picked = currentPicks.includes(i);
        return `<button class="cand-btn ${picked ? 'selected' : ''}" id="cb${i}" onclick="togglePick(${i})">
            <span class="sno">${i + 1}</span>
            <span class="cname">${name.replace(/</g, '&lt;')}</span>
            ${picked ? '<span class="vote-badge">&#10003;</span>' : ''}
        </button>`;
    }).join('');
}

function togglePick(i) {
    const idx = currentPicks.indexOf(i);
    if (idx >= 0) {
        // Deselect
        currentPicks.splice(idx, 1);
        undoStack.push({ action: 'remove', index: i });
    } else {
        if (currentPicks.length >= MAX_PICKS) {
            flashButton(i, '#e94560');
            return;
        }
        currentPicks.push(i);
        undoStack.push({ action: 'add', index: i });
        flashButton(i, null);
    }
    updateBallotUI();
}

function flashButton(i, color) {
    const btn = document.getElementById('cb' + i);
    if (!btn) return;
    btn.classList.add('flash');
    if (color) btn.style.background = color;
    setTimeout(() => {
        btn.classList.remove('flash');
        btn.style.background = '';
        renderVoteGrid();
    }, 200);
}

function undoLast() {
    if (undoStack.length === 0) return;
    const last = undoStack.pop();
    if (last.action === 'add') {
        const idx = currentPicks.indexOf(last.index);
        if (idx >= 0) currentPicks.splice(idx, 1);
    } else if (last.action === 'remove') {
        if (!currentPicks.includes(last.index) && currentPicks.length < MAX_PICKS) {
            currentPicks.push(last.index);
        }
    }
    updateBallotUI();
}

function clearBallot() {
    if (currentPicks.length === 0) return;
    if (confirm('Clear all selections for this ballot?')) {
        currentPicks = [];
        undoStack = [];
        updateBallotUI();
    }
}

function submitBallot() {
    if (currentPicks.length === 0) {
        alert('No candidates selected!');
        return;
    }
    if (!confirm(`Submit ballot with ${currentPicks.length} vote(s)?`)) return;

    currentPicks.forEach(i => { votes[i]++; });
    ballotCount++;
    save();

    currentPicks = [];
    undoStack = [];
    updateBallotUI();
    renderResults();
}

function updateBallotUI() {
    const count = currentPicks.length;
    document.getElementById('ballotNum').textContent = ballotCount + 1;
    document.getElementById('picksUsed').textContent = count;
    document.getElementById('totalBallots').textContent = ballotCount;

    const pickStat = document.getElementById('pickStat');
    pickStat.className = 'stat' + (count >= MAX_PICKS ? ' stat-full' : count >= 15 ? ' stat-warn' : ' stat-ok');

    document.getElementById('submitBtn').disabled = count === 0;
    document.getElementById('undoBtn').disabled = undoStack.length === 0;

    renderVoteGrid();
}

// --- Results Tab ---
function renderResults() {
    document.getElementById('resultBallotCount').textContent = ballotCount;

    const sorted = CANDIDATES.map((name, i) => ({ name, sno: i + 1, votes: votes[i] }))
        .sort((a, b) => b.votes - a.votes || a.sno - b.sno);

    const maxVotes = sorted.length > 0 ? sorted[0].votes : 0;

    const list = document.getElementById('resultsList');
    list.innerHTML = sorted.map((c, rank) => {
        const isTop = rank < 21;
        const pct = maxVotes > 0 ? (c.votes / maxVotes * 100) : 0;
        return `<div class="result-row ${isTop ? 'top-21' : ''}">
            <div class="result-rank">${rank + 1}</div>
            <div class="result-info">
                <div class="result-name">${c.sno}. ${c.name.replace(/</g, '&lt;')}</div>
                <div class="result-bar"><div class="result-bar-fill" style="width:${pct}%"></div></div>
            </div>
            <div class="result-votes">${c.votes}</div>
        </div>`;
    }).join('');
}

// --- Share on WhatsApp ---
function shareWhatsApp() {
    const data = JSON.stringify({ v: votes, b: ballotCount });
    const resultsUrl = 'https://saurabhrungta.github.io/id_card/results.html#' + encodeURIComponent(data);
    const text = 'Live Election Results (Ballots counted: ' + ballotCount + '):\n' + resultsUrl;
    window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

// --- Tabs ---
function showTab(tab) {
    document.getElementById('tabVote').className = 'tab' + (tab === 'vote' ? ' active' : '');
    document.getElementById('tabResults').className = 'tab' + (tab === 'results' ? ' active' : '');
    document.getElementById('voteView').style.display = tab === 'vote' ? 'grid' : 'none';
    document.getElementById('resultsView').style.display = tab === 'results' ? 'block' : 'none';
    if (tab === 'results') renderResults();
}

// --- Reset ---
function resetElection() {
    if (!confirm('This will erase ALL vote data. Are you sure?')) return;
    if (!confirm('REALLY reset? This cannot be undone!')) return;
    votes = CANDIDATES.map(() => 0);
    ballotCount = 0;
    currentPicks = [];
    undoStack = [];
    save();
    updateBallotUI();
    renderResults();
}

// Init
updateBallotUI();
renderResults();
</script>
</body>
</html>
